<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .container {
            background: white; border-radius: 16px;
            padding: 40px; width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #4c3f91; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #555; }
        input[type=number] {
            width: 100%; padding: 12px 16px; border: 2px solid #e1e1e1;
            border-radius: 8px; font-size: 16px;
            transition: border-color 0.2s;
        }
        input[type=number]:focus {
            outline: none; border-color: #667eea;
        }
        button {
            width: 100%; padding: 14px; background: #667eea;
            color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #5a6fd6; }
        .result {
            margin-top: 24px; padding: 20px; background: #f0f4ff;
            border-radius: 10px; text-align: center;
            border-left: 4px solid #667eea;
        }
        .bmi-value { font-size: 48px; font-weight: 700; color: #4c3f91; }
        .bmi-category { font-size: 18px; color: #555; margin-top: 8px; }
        .error { margin-top: 16px; padding: 12px; background: #fff0f0;
                 border-radius: 8px; color: #c00; border-left: 4px solid #c00; }
    </style>
</head>
<body>
<div class="container">
    <h1>BMI Calculator</h1>
    <form method="POST" action="">
        {% csrf_token %}
        <div class="form-group">
            <label for="height">Height (cm)</label>
            <input type="number" id="height" name="height"
                   min="50" max="300" step="0.1"
                   value="{{ height|default:'' }}" required>
        </div>
        <div class="form-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" name="weight"
                   min="1" max="500" step="0.1"
                   value="{{ weight|default:'' }}" required>
        </div>
        <button type="submit">Calculate BMI</button>
    </form>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    {% if result %}
    <div class="result">
        <div class="bmi-value">{{ result }}</div>
        <div class="bmi-category">{{ category }}</div>
        <small style="color:#888;margin-top:8px;display:block">
            {{ height }} cm / {{ weight }} kg
        </small>
    </div>
    {% endif %}
</div>
</body>
</html>
